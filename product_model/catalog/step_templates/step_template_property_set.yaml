id: step_template_property_set
slug: property_set
display_name: Property Set
step_kind: property_set
description: Write value to a specific target schema property or page metadata (icon/cover)
input_contract:
  fields:
    value:
      type: any
      title: Property value
output_contract: {}
config_schema:
  schema_property_id:
    type: string
  target_kind:
    type: string
    default: schema_property
    options:
      - value: schema_property
        label: Schema property
      - value: page_metadata
        label: Page metadata
  target_field:
    type: string
    options:
      - value: cover_image
        label: Cover image
      - value: icon_image
        label: Icon image
runtime_binding: property_set
category: output
status: active
visibility: platform
