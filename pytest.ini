[pytest]
tavern-global-cfg = http-test/config.tavern.yaml
testpaths = http-test tests
python_files = test_*.tavern.yaml test_*.py
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    live_notion: live Notion API connector test (requires NOTION_API_KEY and NOTION_TEST_DATA_SOURCE_ID)
