# Built-in usage provider catalog — keys must match usage_records.provider at runtime.
version: 1
providers:
  - provider_id: anthropic
    display_name: Anthropic (Claude)
    description: LLM token usage via Anthropic Messages API.
    billing_unit: token
    notes: |
      Most handlers use claude-sonnet-4-20250514 (Claude Sonnet 4); step_template_ai_prompt uses
      claude-haiku-4-5-20251001 (Claude Haiku 4.5). Claude API (1P) list pricing: Sonnet 4 $3/MTok base
      input / $15/MTok output; Haiku 4.5 $1/MTok base input / $5/MTok output. Prompt caching, batch,
      long-context, and Bedrock/Vertex differ — see https://www.claude.com/pricing
  - provider_id: google_places
    display_name: Google Places
    description: Places API (New) — searchText + optional place details (GET place by id); usage ops search_places / get_place_details.
    billing_unit: call
    notes: |
      List pricing (USD, global): Text Search Pro $32/1000 events; Place Details Pro $17/1000; volume tiers
      and monthly free caps apply per Google’s billing account. Field masks bill at the highest applicable
      SKU (Pro vs Enterprise / +Atmosphere); photos may use Place Details Photos separately. See Google Maps
      Platform “core services pricing list” — Places API (New).
  - provider_id: freepik
    display_name: Freepik Icons API
    description: Icon search via Freepik API (GET /v1/icons; usage metric search_icons).
    billing_unit: call
    notes: |
      Runtime uses Stock Content Icons search (GET https://api.freepik.com/v1/icons). Freepik
      Developer console (indicative): Icons — 25 requests/day on free access vs 2,500/day on pay
      per use; monthly usage budget 5 EUR vs 500 EUR. Separate products (e.g. Stock Content
      “Search and features”, AI Icon Generation) have their own limits — see your account.
      Admin USD/call estimates use DB rate cards; replace with values from Freepik billing when known.
  - provider_id: notion
    display_name: Notion API
    description: Notion workspace HTTP/API usage.
    billing_unit: call
